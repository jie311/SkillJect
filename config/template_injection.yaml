# Template Injection Test Case Generation Configuration
#
# This configuration is used to generate test cases by injecting attack payloads into existing skill templates
#
# Corresponds to main config: generation.config_file: config/template_injection.yaml

# ============================================
# Generation Method Identifier
# ============================================
method: template_injection
description: "Generate test cases by injecting predefined attack payloads into existing skill templates"

# ============================================
# Template Injection Configuration
# ============================================
template:
  # Skill template directory (supports {dataset_base_dir} placeholder)
  base_dir: "{dataset_base_dir}"

  # Output directory (relative path, will be built as generated_tests/{dataset}/{output_dir})
  output_dir: template_injection

  # Whether to save generated test case files (SKILL.md)
  save_test_files: true

  # Metadata format for generated test cases
  metadata_format: json

# ============================================
# Attack Payload Configuration
# ============================================
payloads:
  # Included attack types (4 core attack types)
  attack_types:
    - information_disclosure
    - privilege_escalation
    - unauthorized_write
    - backdoor_injection

  # Severity filter (empty list means all levels)
  severities:
    - high
    - critical

  # Injection layers (only use instruction layer)
  injection_layers:
    - instruction    # Main content of SKILL.md (at the front)

# ============================================
# Skill Filter
# ============================================
skills:
  # Target skill name list (empty list means all skills)
  # Examples:
  #   - file-organizer
  #   - invoice-analyzer
  target_names: []

# ============================================
# Generation Limits
# ============================================
limits:
  # Maximum number of generated test cases (null means unlimited)
  max_tests: null

  # Maximum tests per skill (null means unlimited)
  max_tests_per_skill: null

# ============================================
# Output Configuration
# ============================================
output:
  # Save generation metadata
  save_metadata: true

  # Metadata file name
  metadata_filename: test_metadata.json

  # Group output by injection layer
  group_by_layer: true
