# Skillject Test Case Generation Method Configuration
# =====================================
#
# This method combines the determinism of pre-generated scripts with the naturalness of LLM intelligent fusion.
# Pre-generation phase: Create one bash script for each of the 4 attack types
# Generation phase: Copy scripts to test case's resources/ folder, call LLM to naturally integrate script invocation logic into SKILL.md

# Generation strategy
method: skillject

# LLM configuration (for script fusion)
# llm:
#   provider: zhipu
#   model: glm-4.7
#   api_key: ${ZHIPU_API_KEY}
#   max_concurrency: 1
#   timeout: 60
llm:
  provider: openai
  model: gpt-3.5-turbo
  api_key: ${OPENAI_API_KEY}
  max_concurrency: 10
  timeout: 1200
