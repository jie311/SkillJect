# Two-Phase Evaluation Framework - Main Configuration File
#
# This file selects which test case generation method to use and general configuration
#
# Usage:
#   python run.py -c config/main.yaml
#   or
#   python evaluation/run.py --config config/main.yaml

# ============================================
# Test Case Generation Method Selection
# ============================================
generation:
  # Generation method configuration file - choose one of the following:
  config_file: config/skillject.yaml
  # config_file: config/template_injection.yaml

# ============================================
# Dataset Configuration
# ============================================
dataset:
  name: skills_sample
  base_dir: data/skills_sample

# ============================================
# Test Execution Configuration
# ============================================
execution:
  # Concurrency configuration (each test uses independent sandbox for concurrent execution)
  max_concurrency: 2

  # Timeout configuration (seconds)
  test_timeout: 120
  command_timeout: 1200

  # Retry configuration
  retry_failed: true
  max_retries: 3

  # Output configuration
  output_dir: experiment_results_glm
  save_detailed_logs: true

  # ============================================
  # OpenSandbox Configuration
  # ============================================
  sandbox:
    # OpenSandbox server address (can be overridden via SANDBOX_DOMAIN environment variable)
    domain: localhost:8080
    # Sandbox image (can be overridden via SANDBOX_IMAGE environment variable)
    image: claude_code:latest

  # ============================================
  # Agent Authentication Configuration
  # ============================================
  agent:
    # Agent type (supported values: claude-code, gemini-cli, codex-cli, iflow-cli)
    agent_type: claude-code
    # Authentication Token environment variable name (backward compatible)
    auth_token_env: ANTHROPIC_AUTH_TOKEN
    # API Base URL environment variable name (optional)
    base_url_env: ANTHROPIC_BASE_URL
    # Model name environment variable name (optional)
    model_env: ANTHROPIC_MODEL
    # Skip permission confirmation (for testing)
    bypass_mode: true

    # ============================================
    # Dynamic Injection Configuration (new)
    # ============================================
    # Specify which authentication field to use
    # - True: use api_key (Claude official API)
    # - False: use auth_token (GLM/GPT/MiniMax)
    use_api_key: false
    # Authentication key (direct configuration, takes priority over environment variables)
    auth_token: Your api key
    api_key: ""  # Claude official API key (leave empty to use auth_token)
    # API endpoint (optional)
    base_url: Your url
    # Model name (optional)
    model: glm-4.7
    # Disable unnecessary traffic
    disable_traffic: "1"

# ============================================
# Global Settings
# ============================================
global:
  verbose: false
  log_level: INFO

# ============================================
# Advanced Options
# ============================================
advanced:
  batch_size: 10

# ============================================
# Feedback-Driven Adaptive Iteration Configuration
# ============================================
# Note: Streaming mode is controlled via CLI parameter --streaming
# Supports all generation strategies (skillject, template_injection, llm_intelligent)
adaptive_iteration:
  # Maximum attempts per test (default 5)
  # Can be overridden via --max-attempts CLI option
  max_attempts: 5

  # Whether to stop after single success (skip remaining iterations)
  # Can be enabled via --stop-on-success CLI option
  stop_on_success: true
